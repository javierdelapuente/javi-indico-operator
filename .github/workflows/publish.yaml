name: Publish to edge

on:
  push:
    branches:
      - main
      - track/*

jobs:
  publish:
    uses: canonical/charm-ci/.github/workflows/publish-artifacts.yml@main
    permissions:
      contents: read
      actions: read
    secrets:
      CHARMHUB_TOKEN: ${{ secrets.CHARMHUB_TOKEN }}
    with:
      channel: latest/edge
      integration-workflow-name: integration-test.yaml
